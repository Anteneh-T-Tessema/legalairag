name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python backend ────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pyright

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pyright type check
        run: pyright

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: indyleg
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: indyleg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U indyleg"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        env:
          DATABASE_URL: postgresql+psycopg://indyleg:changeme@localhost:5432/indyleg
          APP_ENV: test
          API_SECRET_KEY: test-secret-key-for-ci-000
        run: pytest tests/unit/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=60

      - name: Integration tests
        env:
          DATABASE_URL: postgresql+psycopg://indyleg:changeme@localhost:5432/indyleg
          APP_ENV: test
          API_SECRET_KEY: test-secret-key-for-ci-000
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: pytest tests/integration/ -v --tb=short

  # ── React frontend ───────────────────────────────────────
  frontend:
    name: UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker build smoke test ──────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infrastructure/docker/Dockerfile.api -t indyleg-api .

      - name: Build Worker image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t indyleg-worker .

      - name: Build UI image
        run: docker build -f ui/Dockerfile -t indyleg-ui ui/
