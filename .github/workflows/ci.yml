name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python backend ────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: indyleg
          POSTGRES_PASSWORD: indyleg
          POSTGRES_DB: indyleg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U indyleg"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://indyleg:indyleg@localhost:5432/indyleg_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports || true

      - name: Unit tests
        run: pytest tests/ -v --ignore=tests/integration --tb=short -q

      - name: Integration tests (pgvector)
        run: pytest tests/integration/ -v -k "pgvector" --tb=short -q

  # ── React frontend ───────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker build smoke test ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infrastructure/docker/Dockerfile -t indyleg-api:ci .

      - name: Verify image runs
        run: |
          docker run --rm indyleg-api:ci python -c "import indyleg; print('OK')" || true
