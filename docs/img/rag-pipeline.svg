<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">
  <rect width="820" height="420" rx="12" fill="#0f172a"/>
  <text x="410" y="30" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">RAG QUERY PIPELINE</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#475569"/>
    </marker>
    <marker id="a-ok" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#22c55e"/>
    </marker>
    <marker id="a-warn" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Step boxes -->
  <!-- 1 User Question -->
  <rect x="20" y="170" width="100" height="50" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="70" y="191" text-anchor="middle" fill="#38bdf8" font-weight="700" font-size="11">User</text>
  <text x="70" y="207" text-anchor="middle" fill="#38bdf8" font-size="10">Question</text>
  <line x1="120" y1="195" x2="148" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 2 QueryParser -->
  <rect x="150" y="148" width="105" height="95" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="202" y="168" text-anchor="middle" fill="#fcd34d" font-weight="700" font-size="11">QueryParser</text>
  <line x1="160" y1="175" x2="248" y2="175" stroke="#334155" stroke-width="1"/>
  <text x="162" y="189" fill="#78716c" font-size="9">jurisdiction</text>
  <text x="162" y="202" fill="#78716c" font-size="9">case_type</text>
  <text x="162" y="215" fill="#78716c" font-size="9">IC § citations</text>
  <text x="162" y="228" fill="#78716c" font-size="9">BM25 keywords</text>
  <line x1="255" y1="195" x2="280" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 3 Embedder -->
  <rect x="282" y="163" width="95" height="64" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="329" y="183" text-anchor="middle" fill="#c4b5fd" font-weight="700" font-size="11">Embedder</text>
  <text x="329" y="198" text-anchor="middle" fill="#7c3aed" font-size="9">Titan Embed v2</text>
  <text x="329" y="212" text-anchor="middle" fill="#7c3aed" font-size="9">1024-dim vector</text>
  <line x1="377" y1="195" x2="402" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 4a pgvector -->
  <rect x="404" y="130" width="100" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="454" y="150" text-anchor="middle" fill="#fcd34d" font-weight="700" font-size="11">pgvector</text>
  <text x="454" y="166" text-anchor="middle" fill="#a16207" font-size="9">cosine · top-80</text>
  <!-- 4b OpenSearch -->
  <rect x="404" y="215" width="100" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="454" y="235" text-anchor="middle" fill="#fcd34d" font-weight="700" font-size="11">OpenSearch</text>
  <text x="454" y="251" text-anchor="middle" fill="#a16207" font-size="9">BM25 · top-80</text>

  <!-- HybridSearch bracket lines -->
  <line x1="404" y1="155" x2="390" y2="155" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="155" x2="390" y2="240" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="240" x2="404" y2="240" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="197" x2="402" y2="197" stroke="#475569" stroke-width="1.5"/>
  <text x="395" y="193" text-anchor="end" fill="#475569" font-size="9">vector</text>
  <text x="395" y="246" text-anchor="end" fill="#475569" font-size="9">BM25</text>

  <!-- 5 RRF -->
  <rect x="520" y="163" width="80" height="64" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="183" text-anchor="middle" fill="#6ee7b7" font-weight="700" font-size="11">RRF Fusion</text>
  <text x="560" y="198" text-anchor="middle" fill="#059669" font-size="9">k = 60</text>
  <text x="560" y="212" text-anchor="middle" fill="#059669" font-size="9">top-20</text>
  <line x1="504" y1="155" x2="520" y2="190" stroke="#475569" stroke-width="1" marker-end="url(#a)"/>
  <line x1="504" y1="240" x2="520" y2="210" stroke="#475569" stroke-width="1" marker-end="url(#a)"/>
  <line x1="600" y1="195" x2="622" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 6 Cross-Encoder -->
  <rect x="624" y="163" width="94" height="64" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="671" y="183" text-anchor="middle" fill="#93c5fd" font-weight="700" font-size="11">Reranker</text>
  <text x="671" y="198" text-anchor="middle" fill="#1d4ed8" font-size="9">cross-encoder</text>
  <text x="671" y="212" text-anchor="middle" fill="#1d4ed8" font-size="9">top-5</text>
  <line x1="718" y1="195" x2="743" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 7 Claude -->
  <rect x="745" y="148" width="62" height="95" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="776" y="170" text-anchor="middle" fill="#fda4af" font-weight="700" font-size="11">Claude</text>
  <text x="776" y="185" text-anchor="middle" fill="#fda4af" font-size="9">3.5 Sonnet</text>
  <line x1="766" y1="192" x2="775" y2="192" stroke="#9f1239" stroke-width="1"/>
  <text x="776" y="204" text-anchor="middle" fill="#78716c" font-size="9">temp=0</text>
  <text x="776" y="218" text-anchor="middle" fill="#78716c" font-size="9">4096 tok</text>
  <text x="776" y="232" text-anchor="middle" fill="#78716c" font-size="9">[SOURCE]</text>

  <!-- Answer output -->
  <rect x="745" y="300" width="62" height="44" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="776" y="322" text-anchor="middle" fill="#4ade80" font-weight="700" font-size="10">Answer</text>
  <text x="776" y="336" text-anchor="middle" fill="#166534" font-size="9">+ citations</text>
  <line x1="776" y1="244" x2="776" y2="298" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-ok)"/>

  <!-- Validator sidebox -->
  <rect x="645" y="300" width="90" height="44" rx="6" fill="#431407" stroke="#f97316" stroke-width="1.2"/>
  <text x="690" y="318" text-anchor="middle" fill="#fb923c" font-weight="700" font-size="10">Validator</text>
  <text x="690" y="332" text-anchor="middle" fill="#7c2d12" font-size="9">[SOURCE] guard</text>
  <line x1="776" y1="244" x2="690" y2="298" stroke="#f97316" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-warn)"/>
  <text x="720" y="276" fill="#f97316" font-size="9">validate</text>

  <!-- Fallback -->
  <rect x="548" y="300" width="88" height="44" rx="6" fill="#3b1a08" stroke="#78716c" stroke-width="1"/>
  <text x="592" y="318" text-anchor="middle" fill="#a8a29e" font-size="10">Fallback</text>
  <text x="592" y="332" text-anchor="middle" fill="#57534e" font-size="9">if invalid</text>
  <line x1="645" y1="322" x2="638" y2="322" stroke="#78716c" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <text x="591" y="366" text-anchor="middle" fill="#57534e" font-size="9">↑ blocked hallucination</text>

  <!-- Labels along bottom -->
  <text x="410" y="395" text-anchor="middle" fill="#1e293b" font-size="9" fill="#334155">parse · embed · hybrid-retrieve · fuse · rerank · generate · validate</text>
</svg>
