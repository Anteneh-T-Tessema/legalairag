<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#16a34a" stroke-width="1.5"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#d97706" stroke-width="1.5"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700" letter-spacing="1.5">RAG QUERY PIPELINE</text>
  <text x="480" y="54" text-anchor="middle" fill="#64748b" font-size="11">parse · embed · hybrid-retrieve · fuse · rerank · generate · validate</text>

  <!-- Step 1: User Question -->
  <rect x="20" y="185" width="100" height="60" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="210" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">User</text>
  <text x="70" y="228" text-anchor="middle" fill="#3b82f6" font-size="11">Question</text>
  <line x1="120" y1="215" x2="152" y2="215" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: QueryParser -->
  <rect x="158" y="160" width="118" height="110" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="158" y="160" width="118" height="28" rx="10" fill="#fef3c7"/>
  <text x="217" y="180" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">QueryParser</text>
  <text x="170" y="202" fill="#78716c" font-size="10">• jurisdiction</text>
  <text x="170" y="216" fill="#78716c" font-size="10">• case_type</text>
  <text x="170" y="230" fill="#78716c" font-size="10">• IC § citations</text>
  <text x="170" y="244" fill="#78716c" font-size="10">• BM25 weight</text>
  <text x="170" y="258" fill="#78716c" font-size="10">• temporal filter</text>
  <line x1="276" y1="215" x2="308" y2="215" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 3: Embedder -->
  <rect x="314" y="180" width="108" height="70" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="314" y="180" width="108" height="26" rx="10" fill="#ede9fe"/>
  <text x="368" y="198" text-anchor="middle" fill="#5b21b6" font-weight="700" font-size="12">Embedder</text>
  <text x="368" y="218" text-anchor="middle" fill="#6d28d9" font-size="10">Titan Embed v2</text>
  <text x="368" y="234" text-anchor="middle" fill="#6d28d9" font-size="10">1024-dim vector</text>

  <!-- Fork lines from Embedder to dual search -->
  <line x1="422" y1="200" x2="450" y2="155" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="155" x2="478" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="422" y1="230" x2="450" y2="275" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="275" x2="478" y2="275" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4a: pgvector -->
  <rect x="484" y="130" width="110" height="56" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8" filter="url(#shadow-sm)"/>
  <rect x="484" y="130" width="110" height="24" rx="10" fill="#fef3c7"/>
  <text x="539" y="148" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">pgvector</text>
  <text x="539" y="170" text-anchor="middle" fill="#a16207" font-size="10">cosine · top-80</text>

  <!-- Step 4b: OpenSearch -->
  <rect x="484" y="250" width="110" height="56" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8" filter="url(#shadow-sm)"/>
  <rect x="484" y="250" width="110" height="24" rx="10" fill="#fef3c7"/>
  <text x="539" y="268" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">OpenSearch</text>
  <text x="539" y="290" text-anchor="middle" fill="#a16207" font-size="10">BM25 · top-80</text>

  <!-- Labels -->
  <text x="460" y="145" text-anchor="end" fill="#94a3b8" font-size="9" font-style="italic">vector</text>
  <text x="460" y="285" text-anchor="end" fill="#94a3b8" font-size="9" font-style="italic">keyword</text>

  <!-- Merge lines to RRF -->
  <line x1="594" y1="158" x2="620" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="594" y1="278" x2="620" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: RRF Fusion -->
  <rect x="625" y="190" width="90" height="56" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="625" y="190" width="90" height="24" rx="10" fill="#d1fae5"/>
  <text x="670" y="208" text-anchor="middle" fill="#065f46" font-weight="700" font-size="12">RRF Fusion</text>
  <text x="670" y="228" text-anchor="middle" fill="#047857" font-size="10">k=60 · top-20</text>
  <line x1="715" y1="218" x2="745" y2="218" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 6: Reranker -->
  <rect x="751" y="185" width="100" height="66" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="751" y="185" width="100" height="24" rx="10" fill="#dbeafe"/>
  <text x="801" y="203" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">Reranker</text>
  <text x="801" y="222" text-anchor="middle" fill="#1d4ed8" font-size="10">cross-encoder</text>
  <text x="801" y="238" text-anchor="middle" fill="#1d4ed8" font-size="10">top-5</text>

  <!-- Down to Generation row -->
  <line x1="801" y1="251" x2="801" y2="290" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 7: Claude LLM -->
  <rect x="736" y="296" width="130" height="80" rx="10" fill="#ffffff" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <rect x="736" y="296" width="130" height="26" rx="10" fill="#fce7f3"/>
  <text x="801" y="314" text-anchor="middle" fill="#9d174d" font-weight="700" font-size="12">Claude 3.5 Sonnet</text>
  <text x="801" y="336" text-anchor="middle" fill="#be185d" font-size="10">temp=0 · 4096 tokens</text>
  <text x="801" y="352" text-anchor="middle" fill="#be185d" font-size="10">[SOURCE: chunk-id]</text>
  <text x="801" y="366" text-anchor="middle" fill="#9f1239" font-size="9">via AWS Bedrock</text>

  <!-- Down from Claude to Validator -->
  <line x1="801" y1="376" x2="801" y2="404" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>

  <!-- Step 8: Validator -->
  <rect x="736" y="410" width="130" height="48" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.8" filter="url(#shadow-sm)"/>
  <text x="801" y="432" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">Citation Validator</text>
  <text x="801" y="448" text-anchor="middle" fill="#a16207" font-size="10">[SOURCE] tag guard</text>

  <!-- Validator → Answer (pass) -->
  <line x1="866" y1="434" x2="892" y2="434" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Answer box -->
  <rect x="898" y="410" width="50" height="48" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="923" y="432" text-anchor="middle" fill="#166534" font-weight="700" font-size="11">✓</text>
  <text x="923" y="448" text-anchor="middle" fill="#166534" font-size="10">Answer</text>

  <!-- Validator → Fallback (fail) -->
  <line x1="736" y1="434" x2="700" y2="434" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="610" y="418" width="86" height="34" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="653" y="438" text-anchor="middle" fill="#991b1b" font-size="10">Fallback</text>
  <text x="653" y="450" text-anchor="middle" fill="#b91c1c" font-size="9">if uncited</text>

  <!-- Step numbers -->
  <circle cx="70" cy="175" r="10" fill="#3b82f6"/>
  <text x="70" y="179" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
  <circle cx="217" cy="150" r="10" fill="#f59e0b"/>
  <text x="217" y="154" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
  <circle cx="368" cy="170" r="10" fill="#8b5cf6"/>
  <text x="368" y="174" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
  <circle cx="539" cy="120" r="10" fill="#f59e0b"/>
  <text x="539" y="124" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
  <circle cx="670" cy="180" r="10" fill="#10b981"/>
  <text x="670" y="184" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">5</text>
  <circle cx="801" cy="175" r="10" fill="#3b82f6"/>
  <text x="801" y="179" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">6</text>
  <circle cx="876" cy="296" r="10" fill="#ec4899"/>
  <text x="876" y="300" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">7</text>
  <circle cx="876" cy="410" r="10" fill="#d97706"/>
  <text x="876" y="414" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">8</text>

  <!-- Bottom legend -->
  <rect x="30" y="460" width="900" height="30" rx="8" fill="#f1f5f9"/>
  <circle cx="60" cy="475" r="5" fill="#3b82f6"/>  <text x="70" y="479" fill="#475569" font-size="10">Interface</text>
  <circle cx="150" cy="475" r="5" fill="#f59e0b"/>  <text x="160" y="479" fill="#475569" font-size="10">Parse / Retrieve</text>
  <circle cx="270" cy="475" r="5" fill="#8b5cf6"/>  <text x="280" y="479" fill="#475569" font-size="10">Embed</text>
  <circle cx="340" cy="475" r="5" fill="#10b981"/>  <text x="350" y="479" fill="#475569" font-size="10">Fuse</text>
  <circle cx="400" cy="475" r="5" fill="#ec4899"/>  <text x="410" y="479" fill="#475569" font-size="10">Generate</text>
  <circle cx="480" cy="475" r="5" fill="#d97706"/>  <text x="490" y="479" fill="#475569" font-size="10">Validate</text>
  <circle cx="560" cy="475" r="5" fill="#16a34a"/>  <text x="570" y="479" fill="#475569" font-size="10">Grounded Answer</text>
  <rect x="680" y="470" width="20" height="10" rx="3" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="706" y="479" fill="#475569" font-size="10">Fallback (hallucination blocked)</text>
</svg>
