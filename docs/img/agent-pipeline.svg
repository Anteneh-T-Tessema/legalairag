<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">
  <rect width="820" height="300" rx="12" fill="#0f172a"/>
  <text x="410" y="28" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">AGENT PIPELINE</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- User / API -->
  <rect x="18" y="115" width="80" height="50" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="58" y="136" text-anchor="middle" fill="#7dd3fc" font-weight="700" font-size="10">REST API</text>
  <text x="58" y="151" text-anchor="middle" fill="#0369a1" font-size="9">POST /ask</text>
  <line x1="98" y1="140" x2="122" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Base Agent Orchestrator -->
  <rect x="124" y="98" width="130" height="84" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="189" y="118" text-anchor="middle" fill="#c4b5fd" font-weight="700" font-size="10">BaseAgent</text>
  <text x="189" y="132" text-anchor="middle" fill="#6d28d9" font-size="9">orchestrator</text>
  <line x1="134" y1="140" x2="248" y2="140" stroke="#4c1d95" stroke-width="0.5"/>
  <text x="133" y="151" fill="#6d28d9" font-size="9">route(intent)</text>
  <text x="133" y="164" fill="#4c1d95" font-size="9">audit_log()</text>
  <text x="133" y="177" fill="#4c1d95" font-size="9">stream_response()</text>
  <line x1="254" y1="121" x2="280" y2="80" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>
  <line x1="254" y1="140" x2="280" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="254" y1="160" x2="280" y2="200" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>
  <line x1="254" y1="175" x2="278" y2="248" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>

  <!-- Agent 1: CaseResearch -->
  <rect x="282" y="50" width="130" height="64" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="347" y="70" text-anchor="middle" fill="#6ee7b7" font-weight="700" font-size="10">CaseResearchAgent</text>
  <text x="347" y="85" text-anchor="middle" fill="#059669" font-size="9">hybrid_search()</text>
  <text x="347" y="98" text-anchor="middle" fill="#047857" font-size="9">rerank() · generate()</text>
  <line x1="412" y1="78" x2="446" y2="78" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>

  <!-- Agent 2: FraudDetection -->
  <rect x="282" y="120" width="130" height="64" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="347" y="140" text-anchor="middle" fill="#fcd34d" font-weight="700" font-size="10">FraudDetectionAgent</text>
  <text x="347" y="155" text-anchor="middle" fill="#92400e" font-size="9">anomaly_detection()</text>
  <text x="347" y="168" text-anchor="middle" fill="#78350f" font-size="9">risk_score() · explain()</text>
  <line x1="412" y1="152" x2="446" y2="152" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>

  <!-- Agent 3: Summarization -->
  <rect x="282" y="190" width="130" height="48" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="347" y="210" text-anchor="middle" fill="#93c5fd" font-weight="700" font-size="10">SummarizationAgent</text>
  <text x="347" y="225" text-anchor="middle" fill="#1d4ed8" font-size="9">extractive + abstractive</text>
  <line x1="412" y1="214" x2="446" y2="214" stroke="#475569" stroke-width="1.2" marker-end="url(#a2)"/>

  <!-- Agent 4: future -->
  <rect x="282" y="248" width="130" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="347" y="266" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">+ custom agents</text>
  <text x="347" y="278" text-anchor="middle" fill="#1e293b" font-size="9">plug BaseAgent</text>

  <!-- Shared services column -->
  <text x="449" y="42" fill="#64748b" font-size="10" font-weight="600">SHARED SERVICES</text>

  <!-- RAG / Retrieval -->
  <rect x="449" y="50" width="120" height="48" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.2"/>
  <text x="509" y="70" text-anchor="middle" fill="#fda4af" font-weight="700" font-size="10">RAG Pipeline</text>
  <text x="509" y="84" text-anchor="middle" fill="#9d174d" font-size="9">hybrid_search · reranker</text>
  <line x1="569" y1="74" x2="595" y2="74" stroke="#475569" stroke-width="1" marker-end="url(#a2)"/>

  <!-- Fraud model -->
  <rect x="449" y="120" width="120" height="48" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="509" y="140" text-anchor="middle" fill="#fcd34d" font-weight="700" font-size="10">Fraud Model</text>
  <text x="509" y="154" text-anchor="middle" fill="#92400e" font-size="9">anomaly · rule engine</text>
  <line x1="569" y1="144" x2="595" y2="144" stroke="#475569" stroke-width="1" marker-end="url(#a2)"/>

  <!-- Generator -->
  <rect x="449" y="190" width="120" height="48" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="509" y="210" text-anchor="middle" fill="#c4b5fd" font-weight="700" font-size="10">Generator</text>
  <text x="509" y="224" text-anchor="middle" fill="#6d28d9" font-size="9">Claude 3.5 · validate</text>
  <line x1="569" y1="214" x2="595" y2="214" stroke="#475569" stroke-width="1" marker-end="url(#a2)"/>

  <!-- Output box -->
  <rect x="597" y="100" width="110" height="100" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="652" y="124" text-anchor="middle" fill="#4ade80" font-weight="700" font-size="10">Response</text>
  <text x="652" y="140" text-anchor="middle" fill="#16a34a" font-size="9">answer + citations</text>
  <text x="652" y="154" text-anchor="middle" fill="#166534" font-size="9">risk_score (fraud)</text>
  <text x="652" y="168" text-anchor="middle" fill="#166534" font-size="9">summary (summ.)</text>
  <text x="652" y="182" text-anchor="middle" fill="#166534" font-size="9">run_id tracking</text>
  <line x1="707" y1="150" x2="732" y2="150" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Stream back -->
  <rect x="734" y="128" width="68" height="44" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="768" y="148" text-anchor="middle" fill="#7dd3fc" font-weight="700" font-size="10">Client</text>
  <text x="768" y="162" text-anchor="middle" fill="#0369a1" font-size="9">SSE stream</text>
</svg>
