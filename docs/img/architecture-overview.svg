<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <!-- Card shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="ah" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#7c3aed"/>
    </marker>
    <!-- Gradient for header bar -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="580" rx="14" fill="#f8fafc"/>
  <!-- Subtle top accent bar -->
  <rect width="920" height="4" rx="2" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700" letter-spacing="2.5">INDYLEG — INDIANA LEGAL RAG PLATFORM</text>

  <!-- ========= UI Layer ========= -->
  <rect x="30" y="54" width="184" height="134" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="54" width="184" height="24" rx="10" fill="#dbeafe"/>
  <rect x="30" y="68" width="184" height="10" fill="#dbeafe"/>
  <text x="122" y="72" text-anchor="middle" fill="#1d4ed8" font-weight="700" font-size="12">React UI</text>
  <text x="122" y="90" text-anchor="middle" fill="#64748b" font-size="10">Vite · TypeScript</text>
  <line x1="44" y1="97" x2="200" y2="97" stroke="#e2e8f0" stroke-width="1"/>
  <text x="48" y="113" fill="#475569" font-size="11">• Ask / Chat tab</text>
  <text x="48" y="129" fill="#475569" font-size="11">• Search &amp; filters</text>
  <text x="48" y="145" fill="#475569" font-size="11">• Document upload</text>
  <text x="48" y="161" fill="#475569" font-size="11">• Login · RBAC UI</text>

  <!-- Arrow UI → API -->
  <line x1="214" y1="121" x2="252" y2="121" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)" stroke-dasharray="5,3"/>
  <text x="233" y="115" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">JWT</text>

  <!-- ========= API Layer ========= -->
  <rect x="256" y="54" width="194" height="134" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="256" y="54" width="194" height="24" rx="10" fill="#ede9fe"/>
  <rect x="256" y="68" width="194" height="10" fill="#ede9fe"/>
  <text x="353" y="72" text-anchor="middle" fill="#6d28d9" font-weight="700" font-size="12">FastAPI</text>
  <text x="353" y="90" text-anchor="middle" fill="#64748b" font-size="10">/api/v1</text>
  <line x1="270" y1="97" x2="436" y2="97" stroke="#e2e8f0" stroke-width="1"/>
  <text x="269" y="113" fill="#475569" font-size="11">POST /search</text>
  <text x="269" y="129" fill="#475569" font-size="11">POST /search/ask</text>
  <text x="269" y="145" fill="#475569" font-size="11">POST /fraud/analyze</text>
  <text x="269" y="161" fill="#475569" font-size="11">POST /auth/token</text>

  <!-- Arrow API → Agents -->
  <line x1="450" y1="121" x2="488" y2="121" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah-purple)"/>

  <!-- ========= Agent Layer ========= -->
  <rect x="492" y="54" width="206" height="134" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="492" y="54" width="206" height="24" rx="10" fill="#d1fae5"/>
  <rect x="492" y="68" width="206" height="10" fill="#d1fae5"/>
  <text x="595" y="72" text-anchor="middle" fill="#047857" font-weight="700" font-size="12">Agent Layer</text>
  <line x1="506" y1="84" x2="684" y2="84" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="508" y="92" width="172" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="594" y="110" text-anchor="middle" fill="#065f46" font-size="11" font-weight="500">CaseResearchAgent</text>
  <rect x="508" y="125" width="172" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="594" y="143" text-anchor="middle" fill="#065f46" font-size="11" font-weight="500">FraudDetectionAgent</text>
  <rect x="508" y="158" width="172" height="24" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="594" y="174" text-anchor="middle" fill="#065f46" font-size="11" font-weight="500">SummarizationAgent</text>

  <!-- ========= Retrieval Layer ========= -->
  <rect x="30" y="224" width="410" height="152" rx="10" fill="#ffffff" stroke="#fde68a" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="224" width="410" height="24" rx="10" fill="#fef3c7"/>
  <rect x="30" y="238" width="410" height="10" fill="#fef3c7"/>
  <text x="235" y="242" text-anchor="middle" fill="#b45309" font-weight="700" font-size="12">Retrieval Layer</text>
  <line x1="44" y1="252" x2="426" y2="252" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="48" y="260" width="90" height="44" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="93" y="278" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">QueryParser</text>
  <text x="93" y="292" text-anchor="middle" fill="#a16207" font-size="9">jurisdiction</text>

  <line x1="138" y1="282" x2="154" y2="282" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="158" y="260" width="80" height="44" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="198" y="278" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Embedder</text>
  <text x="198" y="292" text-anchor="middle" fill="#a16207" font-size="9">Titan v2</text>

  <line x1="238" y1="282" x2="254" y2="282" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="258" y="260" width="90" height="44" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="303" y="278" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">HybridSearch</text>
  <text x="303" y="292" text-anchor="middle" fill="#a16207" font-size="9">pgvector+BM25+RRF</text>

  <line x1="348" y1="282" x2="362" y2="282" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="366" y="260" width="58" height="44" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="395" y="278" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Reranker</text>
  <text x="395" y="292" text-anchor="middle" fill="#a16207" font-size="9">MiniLM</text>

  <!-- RRF description -->
  <text x="235" y="327" text-anchor="middle" fill="#78716c" font-size="10">Reciprocal Rank Fusion  k=60 · top-20 → top-5</text>
  <text x="235" y="344" text-anchor="middle" fill="#78716c" font-size="10">Dense (cosine) + Sparse (BM25) fused without score normalisation</text>
  <text x="235" y="361" text-anchor="middle" fill="#78716c" font-size="10">Cross-encoder re-scores final candidates for maximum precision</text>

  <!-- ========= Generation Layer ========= -->
  <rect x="460" y="224" width="256" height="152" rx="10" fill="#ffffff" stroke="#fbcfe8" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="460" y="224" width="256" height="24" rx="10" fill="#fce7f3"/>
  <rect x="460" y="238" width="256" height="10" fill="#fce7f3"/>
  <text x="588" y="242" text-anchor="middle" fill="#be185d" font-weight="700" font-size="12">Generation Layer</text>
  <line x1="474" y1="252" x2="702" y2="252" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="476" y="260" width="100" height="44" rx="6" fill="#fff1f2" stroke="#fda4af" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="526" y="278" text-anchor="middle" fill="#9f1239" font-size="10" font-weight="600">Claude 3.5</text>
  <text x="526" y="292" text-anchor="middle" fill="#be123c" font-size="9">temp=0.0</text>

  <line x1="576" y1="282" x2="592" y2="282" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="596" y="260" width="108" height="44" rx="6" fill="#fff1f2" stroke="#fda4af" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="650" y="278" text-anchor="middle" fill="#9f1239" font-size="10" font-weight="600">CitationValidator</text>
  <text x="650" y="292" text-anchor="middle" fill="#be123c" font-size="9">[SOURCE:] guard</text>

  <text x="588" y="327" text-anchor="middle" fill="#78716c" font-size="10">Every claim requires [SOURCE: chunk-id]</text>
  <text x="588" y="344" text-anchor="middle" fill="#78716c" font-size="10">Hallucinated citations trigger fallback response</text>
  <text x="588" y="361" text-anchor="middle" fill="#78716c" font-size="10">run_id traces every answer end-to-end</text>

  <!-- ========= Ingestion Layer ========= -->
  <rect x="30" y="408" width="410" height="140" rx="10" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="30" y="408" width="410" height="24" rx="10" fill="#e0e7ff"/>
  <rect x="30" y="422" width="410" height="10" fill="#e0e7ff"/>
  <text x="235" y="426" text-anchor="middle" fill="#3730a3" font-weight="700" font-size="12">Ingestion Layer</text>
  <line x1="44" y1="436" x2="426" y2="436" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="48" y="444" width="72" height="40" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="84" y="460" text-anchor="middle" fill="#3730a3" font-size="10">Indiana</text>
  <text x="84" y="474" text-anchor="middle" fill="#3730a3" font-size="10">Courts API</text>

  <line x1="120" y1="464" x2="136" y2="464" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="140" y="444" width="58" height="40" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="169" y="460" text-anchor="middle" fill="#3730a3" font-size="10">SQS</text>
  <text x="169" y="474" text-anchor="middle" fill="#3730a3" font-size="10">+ DLQ</text>

  <line x1="198" y1="464" x2="214" y2="464" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="218" y="444" width="62" height="40" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="249" y="460" text-anchor="middle" fill="#3730a3" font-size="10">Worker</text>
  <text x="249" y="474" text-anchor="middle" fill="#3730a3" font-size="10">Pool ×4</text>

  <line x1="280" y1="464" x2="296" y2="464" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="300" y="444" width="62" height="40" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="331" y="460" text-anchor="middle" fill="#3730a3" font-size="10">Chunker</text>
  <text x="331" y="474" text-anchor="middle" fill="#3730a3" font-size="10">+ Embed</text>

  <line x1="362" y1="464" x2="378" y2="464" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="382" y="444" width="40" height="40" rx="6" fill="#eef2ff" stroke="#a5b4fc" stroke-width="0.8" filter="url(#shadow-sm)"/>
  <text x="402" y="468" text-anchor="middle" fill="#3730a3" font-size="10" font-weight="600">S3</text>

  <text x="235" y="510" text-anchor="middle" fill="#78716c" font-size="10">512-char sliding window · IC § extraction · section boundaries</text>
  <text x="235" y="527" text-anchor="middle" fill="#78716c" font-size="10">Titan Embed v2 · batch=128 · dedup via content-hash</text>

  <!-- ========= Infra Layer ========= -->
  <rect x="460" y="408" width="256" height="140" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="460" y="408" width="256" height="24" rx="10" fill="#f1f5f9"/>
  <rect x="460" y="422" width="256" height="10" fill="#f1f5f9"/>
  <text x="588" y="426" text-anchor="middle" fill="#334155" font-weight="700" font-size="12">Infrastructure (AWS CDK)</text>
  <line x1="474" y1="436" x2="702" y2="436" stroke="#e2e8f0" stroke-width="1"/>
  <text x="588" y="454" text-anchor="middle" fill="#475569" font-size="10">Aurora PostgreSQL + pgvector</text>
  <text x="588" y="470" text-anchor="middle" fill="#475569" font-size="10">OpenSearch 2.x (BM25)</text>
  <text x="588" y="486" text-anchor="middle" fill="#475569" font-size="10">ECS Fargate · ALB · ElastiCache</text>
  <text x="588" y="502" text-anchor="middle" fill="#475569" font-size="10">CloudWatch · Secrets Manager</text>
  <text x="588" y="518" text-anchor="middle" fill="#475569" font-size="10">SQS + DLQ · S3 (raw + processed)</text>

  <!-- Vertical connector arrows -->
  <line x1="353" y1="189" x2="235" y2="222" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah)"/>
  <line x1="595" y1="189" x2="588" y2="222" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah)"/>
  <line x1="235" y1="377" x2="235" y2="406" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah)"/>
  <line x1="588" y1="377" x2="588" y2="406" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah)"/>

  <!-- Footer -->
  <text x="460" y="568" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1">v0.6.0 · Python 3.11 · AWS Bedrock · pgvector · OpenSearch</text>
</svg>
