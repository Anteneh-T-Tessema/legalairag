<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">
  <!-- Background -->
  <rect width="900" height="560" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">INDYLEG — INDIANA LEGAL RAG PLATFORM</text>

  <!-- ========= UI Layer ========= -->
  <rect x="30" y="54" width="180" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="73" text-anchor="middle" fill="#38bdf8" font-weight="700" font-size="12">React UI</text>
  <text x="120" y="90" text-anchor="middle" fill="#64748b" font-size="10">Vite · TypeScript</text>
  <line x1="50" y1="98" x2="190" y2="98" stroke="#1e3a5f" stroke-width="1"/>
  <text x="48" y="113" fill="#94a3b8" font-size="11">• Ask / Chat tab</text>
  <text x="48" y="129" fill="#94a3b8" font-size="11">• Search &amp; filters</text>
  <text x="48" y="145" fill="#94a3b8" font-size="11">• Document upload</text>
  <text x="48" y="161" fill="#94a3b8" font-size="11">• Login · RBAC UI</text>

  <!-- Arrow UI → API -->
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#475569"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <line x1="210" y1="119" x2="248" y2="119" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#ah-blue)" stroke-dasharray="4,3"/>
  <text x="229" y="113" text-anchor="middle" fill="#38bdf8" font-size="9">JWT</text>

  <!-- ========= API Layer ========= -->
  <rect x="250" y="54" width="190" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="345" y="73" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="12">FastAPI</text>
  <text x="345" y="90" text-anchor="middle" fill="#64748b" font-size="10">/api/v1</text>
  <line x1="265" y1="98" x2="426" y2="98" stroke="#1e293b" stroke-width="1"/>
  <text x="263" y="113" fill="#94a3b8" font-size="11">POST /search</text>
  <text x="263" y="129" fill="#94a3b8" font-size="11">POST /search/ask</text>
  <text x="263" y="145" fill="#94a3b8" font-size="11">POST /fraud/analyze</text>
  <text x="263" y="161" fill="#94a3b8" font-size="11">POST /auth/token</text>

  <!-- Arrow API → Agents -->
  <line x1="440" y1="119" x2="478" y2="119" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ========= Agent Layer ========= -->
  <rect x="480" y="54" width="200" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="580" y="73" text-anchor="middle" fill="#34d399" font-weight="700" font-size="12">Agent Layer</text>
  <line x1="495" y1="81" x2="665" y2="81" stroke="#1e293b" stroke-width="1"/>
  <rect x="495" y="90" width="165" height="28" rx="4" fill="#064e3b"/>
  <text x="577" y="108" text-anchor="middle" fill="#6ee7b7" font-size="11">CaseResearchAgent</text>
  <rect x="495" y="123" width="165" height="28" rx="4" fill="#064e3b"/>
  <text x="577" y="141" text-anchor="middle" fill="#6ee7b7" font-size="11">FraudDetectionAgent</text>
  <rect x="495" y="156" width="165" height="22" rx="4" fill="#064e3b"/>
  <text x="577" y="171" text-anchor="middle" fill="#6ee7b7" font-size="11">SummarizationAgent</text>

  <!-- ========= Retrieval Layer ========= -->
  <rect x="30" y="220" width="400" height="150" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="240" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="12">Retrieval Layer</text>
  <line x1="45" y1="248" x2="415" y2="248" stroke="#334155" stroke-width="1"/>

  <rect x="45" y="256" width="90" height="44" rx="4" fill="#422006"/>
  <text x="90" y="274" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">QueryParser</text>
  <text x="90" y="288" text-anchor="middle" fill="#a16207" font-size="9">jurisdiction</text>

  <line x1="135" y1="278" x2="150" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="152" y="256" width="80" height="44" rx="4" fill="#422006"/>
  <text x="192" y="274" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Embedder</text>
  <text x="192" y="288" text-anchor="middle" fill="#a16207" font-size="9">Titan v2</text>

  <line x1="232" y1="278" x2="247" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="249" y="256" width="90" height="44" rx="4" fill="#422006"/>
  <text x="294" y="274" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">HybridSearch</text>
  <text x="294" y="288" text-anchor="middle" fill="#a16207" font-size="9">pgvector+BM25+RRF</text>

  <line x1="339" y1="278" x2="354" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="356" y="256" width="52" height="44" rx="4" fill="#422006"/>
  <text x="382" y="274" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Reranker</text>
  <text x="382" y="288" text-anchor="middle" fill="#a16207" font-size="9">MiniLM</text>

  <!-- RRF label -->
  <text x="230" y="325" text-anchor="middle" fill="#78716c" font-size="10">Reciprocal Rank Fusion  k=60 · top-20 → top-5</text>
  <text x="230" y="343" text-anchor="middle" fill="#78716c" font-size="10">Dense (cosine) + Sparse (BM25) fused without score normalisation</text>
  <text x="230" y="360" text-anchor="middle" fill="#78716c" font-size="10">Cross-encoder re-scores final candidates for maximum precision</text>

  <!-- ========= Generation Layer ========= -->
  <rect x="450" y="220" width="250" height="150" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="575" y="240" text-anchor="middle" fill="#f472b6" font-weight="700" font-size="12">Generation Layer</text>
  <line x1="465" y1="248" x2="685" y2="248" stroke="#334155" stroke-width="1"/>

  <rect x="465" y="256" width="100" height="44" rx="4" fill="#4c0519"/>
  <text x="515" y="274" text-anchor="middle" fill="#fda4af" font-size="10" font-weight="600">Claude 3.5</text>
  <text x="515" y="288" text-anchor="middle" fill="#9f1239" font-size="9">temp=0.0</text>

  <line x1="565" y1="278" x2="582" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="584" y="256" width="105" height="44" rx="4" fill="#4c0519"/>
  <text x="636" y="274" text-anchor="middle" fill="#fda4af" font-size="10" font-weight="600">CitationValidator</text>
  <text x="636" y="288" text-anchor="middle" fill="#9f1239" font-size="9">[SOURCE:] guard</text>

  <text x="575" y="325" text-anchor="middle" fill="#78716c" font-size="10">Every claim requires [SOURCE: chunk-id]</text>
  <text x="575" y="343" text-anchor="middle" fill="#78716c" font-size="10">Hallucinated citations trigger fallback response</text>
  <text x="575" y="362" text-anchor="middle" fill="#78716c" font-size="10">run_id traces every answer end-to-end</text>

  <!-- ========= Ingestion Layer ========= -->
  <rect x="30" y="400" width="400" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="420" text-anchor="middle" fill="#60a5fa" font-weight="700" font-size="12">Ingestion Layer</text>
  <line x1="45" y1="428" x2="415" y2="428" stroke="#334155" stroke-width="1"/>

  <rect x="45" y="436" width="72" height="38" rx="4" fill="#172554"/>
  <text x="81" y="452" text-anchor="middle" fill="#93c5fd" font-size="10">Indiana</text>
  <text x="81" y="466" text-anchor="middle" fill="#93c5fd" font-size="10">Courts API</text>

  <line x1="117" y1="455" x2="133" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="135" y="436" width="58" height="38" rx="4" fill="#172554"/>
  <text x="164" y="452" text-anchor="middle" fill="#93c5fd" font-size="10">SQS</text>
  <text x="164" y="466" text-anchor="middle" fill="#93c5fd" font-size="10">+ DLQ</text>

  <line x1="193" y1="455" x2="210" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="212" y="436" width="62" height="38" rx="4" fill="#172554"/>
  <text x="243" y="452" text-anchor="middle" fill="#93c5fd" font-size="10">Worker</text>
  <text x="243" y="466" text-anchor="middle" fill="#93c5fd" font-size="10">Pool ×4</text>

  <line x1="274" y1="455" x2="291" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="293" y="436" width="58" height="38" rx="4" fill="#172554"/>
  <text x="322" y="452" text-anchor="middle" fill="#93c5fd" font-size="10">Chunker</text>
  <text x="322" y="466" text-anchor="middle" fill="#93c5fd" font-size="10">+ Embed</text>

  <line x1="351" y1="455" x2="368" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="370" y="436" width="35" height="38" rx="4" fill="#172554"/>
  <text x="388" y="456" text-anchor="middle" fill="#93c5fd" font-size="10">S3</text>

  <text x="230" y="505" text-anchor="middle" fill="#78716c" font-size="10">512-char sliding window · IC § extraction · section boundaries</text>
  <text x="230" y="521" text-anchor="middle" fill="#78716c" font-size="10">Titan Embed v2 · batch=128 · dedup via content-hash</text>

  <!-- ========= Infra Layer ========= -->
  <rect x="450" y="400" width="250" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="575" y="420" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="12">Infrastructure (AWS CDK)</text>
  <line x1="465" y1="428" x2="685" y2="428" stroke="#334155" stroke-width="1"/>
  <text x="575" y="447" text-anchor="middle" fill="#64748b" font-size="10">Aurora PostgreSQL + pgvector</text>
  <text x="575" y="463" text-anchor="middle" fill="#64748b" font-size="10">OpenSearch 2.x (BM25)</text>
  <text x="575" y="479" text-anchor="middle" fill="#64748b" font-size="10">ECS Fargate · ALB · ElastiCache</text>
  <text x="575" y="495" text-anchor="middle" fill="#64748b" font-size="10">CloudWatch · Secrets Manager</text>
  <text x="575" y="511" text-anchor="middle" fill="#64748b" font-size="10">SQS + DLQ · S3 (raw + processed)</text>

  <!-- Vertical connector arrows -->
  <!-- UI → Retrieval (via API) -->
  <line x1="345" y1="185" x2="230" y2="218" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <!-- Agent → Generation -->
  <line x1="580" y1="185" x2="575" y2="218" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <!-- Retrieval → Ingestion (feeds index) -->
  <line x1="230" y1="372" x2="230" y2="398" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <!-- Generation → Infra -->
  <line x1="575" y1="372" x2="575" y2="398" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ah)"/>
</svg>
